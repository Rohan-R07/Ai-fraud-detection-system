<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeGuard AI | Fraud Detection</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        input, select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.5);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Result Section */
        #resultArea {
            margin-top: 32px;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; scale: 0.95; }
            to { opacity: 1; scale: 1; }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .prediction-badge {
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-fraud { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-safe { background: rgba(34, 197, 94, 0.2); color: var(--success); }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 16px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .explanation-box {
            background: rgba(99, 102, 241, 0.05);
            border-left: 3px solid var(--primary);
            padding: 16px;
            border-radius: 0 12px 12px 0;
        }

        .explanation-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .explanation-text {
            font-size: 13.5px;
            line-height: 1.6;
            color: var(--text-main);
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 20px;
            display: none;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Risk Colors */
        .risk-high { color: var(--danger); }
        .risk-medium { color: var(--warning); }
        .risk-low { color: var(--success); }

    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h1>SafeGuard AI</h1>
            <p>Advanced Real-time Fraud Detection</p>
        </div>

        <form id="fraudForm">
            <div class="form-group">
                <label>Step (Time Period)</label>
                <input type="number" id="step" placeholder="Enter step (e.g., 1)" required min="1">
            </div>

            <div class="form-group">
                <label>Transaction Type</label>
                <select id="type" required>
                    <option value="" disabled selected>Select type</option>
                    <option value="PAYMENT">PAYMENT</option>
                    <option value="TRANSFER">TRANSFER</option>
                    <option value="CASH_OUT">CASH_OUT</option>
                    <option value="CASH_IN">CASH_IN</option>
                    <option value="DEBIT">DEBIT</option>
                </select>
            </div>

            <div class="form-group">
                <label>Amount ($)</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01" required min="0">
            </div>

            <button type="submit" id="submitBtn">
                <span id="btnText">Check Fraud</span>
            </button>
        </form>

        <div id="errorMsg" class="error-msg"></div>

        <div id="resultArea">
            <div class="result-card">
                <div class="prediction-header">
                    <h3 id="predictionTitle" style="font-size: 18px; font-weight: 700;">Prediction Result</h3>
                    <span id="predictionBadge" class="prediction-badge"></span>
                </div>

                <div class="stat-grid">
                    <div class="stat-item">
                        <span class="stat-label">Confidence</span>
                        <span id="confidenceVal" class="stat-value">0%</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Risk Level</span>
                        <span id="riskLevel" class="stat-value">---</span>
                    </div>
                </div>

                <div class="explanation-box">
                    <div class="explanation-title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10H12V2z"></path><path d="M12 12L2.69 7"></path><path d="M12 22a10 10 0 0 0 10-10H12v10z"></path></svg>
                        AI EXPLANATION
                    </div>
                    <p id="explanationText" class="explanation-text">Analyzing patterns...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('fraudForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const resultArea = document.getElementById('resultArea');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Reset state
        errorMsg.style.display = 'none';
        resultArea.style.display = 'none';
        submitBtn.disabled = true;
        btnText.innerHTML = '<div class="spinner"></div> Processing...';

        const payload = {
            step: parseInt(document.getElementById('step').value),
            type: document.getElementById('type').value,
            amount: parseFloat(document.getElementById('amount').value)
        };

        try {
            // Local backend URL
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error('System error: Unable to reach AI engine.');

            const data = await response.json();
            showResult(data);

        } catch (err) {
            errorMsg.textContent = err.message;
            errorMsg.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            btnText.textContent = 'Check Fraud';
        }
    });

    function showResult(data) {
        const isFraud = data.prediction === 'Fraud';
        const confidence = data.confidence;
        
        // 1. Set Badge and Title
        const badge = document.getElementById('predictionBadge');
        badge.textContent = data.prediction;
        badge.className = `prediction-badge ${isFraud ? 'badge-fraud' : 'badge-safe'}`;
        document.getElementById('predictionTitle').textContent = isFraud ? '⚠️ Fraud Alert' : '✅ Transaction Safe';

        // 2. Set Stats
        document.getElementById('confidenceVal').textContent = (confidence * 100).toFixed(1) + '%';
        
        // 3. Determine Risk Level
        const riskEl = document.getElementById('riskLevel');
        let riskText = '';
        let riskClass = '';

        if (isFraud) {
            if (confidence > 0.85) {
                riskText = 'CRITICAL';
                riskClass = 'risk-high';
            } else {
                riskText = 'ELEVATED';
                riskClass = 'risk-medium';
            }
        } else {
            if (confidence > 0.85) {
                riskText = 'MINIMAL';
                riskClass = 'risk-low';
            } else {
                riskText = 'CAUTION';
                riskClass = 'risk-medium';
            }
        }

        riskEl.textContent = riskText;
        riskEl.className = `stat-value ${riskClass}`;

        // 4. Set Explanation
        document.getElementById('explanationText').textContent = data.explanation || "No explanation provided by AI.";

        // 5. Show Result Area
        resultArea.style.display = 'block';
    }
</script>

</body>
</html>
